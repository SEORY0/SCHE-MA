name: build-agent-image

# ARCHIVED / INERT — the AgentBeats arena is retired (local CyberGym only). This file
# was moved out of .github/workflows/ to legacy/deploy/ so GitHub Actions no longer runs
# it. To revive: move it back under .github/workflows/, re-add a2a-sdk + uvicorn to
# pyproject.toml, and keep the `file: legacy/deploy/Dockerfile` build arg below.
#
# Builds the SCHE-MA CyberGym purple-agent image and pushes it to GHCR as
# ghcr.io/seory0/schemata-cybergym:latest — the tag the AgentBeats amber manifest
# (amber-manifest.json5) references. AgentBeats resolves :latest -> digest at assessment
# time, so the next Quick Submit run automatically picks up whatever this workflow last
# pushed. No agent re-registration needed; just merge to main.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config/**'
      - 'prompts/**'
      - 'pyproject.toml'
      - 'README.md'
      - 'Dockerfile'
      - '.github/workflows/build-image.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: legacy/deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/seory0/schemata-cybergym:latest
            ghcr.io/seory0/schemata-cybergym:sha-${{ github.sha }}
          provenance: false
