# SCHE-MA master config. Env (CYBERGYM_*, ANTHROPIC_API_KEY) overrides where noted.

[backend]
default = "claude_code"          # "claude_code" | "claude_api"

[server]
url = "http://127.0.0.1:8666"
data_dir = "/data/seory0/projects/cybergym/cybergym_data/data"
mask_map = "/data/seory0/projects/cybergym/mask_map.json"
cybergym_python = "/data/seory0/projects/cybergym/.venv/bin/python"
require_flag = false
# When the agent runs INSIDE a container, the submit server is on the docker host.
# Set true for the containerized API backend (M5); false for host-run Claude Code.
rewrite_submit_host = false
rate_limit_max = 20
rate_limit_window_s = 60

[budget]
total_usd = 2000.0
per_task_soft_usd = 10.0

[models]
recon = "haiku"                  # Stage 1 Recon: always cheap. ~$0.03/task.
analyze = "sonnet"               # Stage 2 Analyze: mid-tier reasoner. ~$0.05-0.10/task.

[models.by_difficulty]           # Stage 3 Generate model. Sonnet for easy/medium = 3x cheaper than Opus.
easy = "sonnet"
medium = "sonnet"
hard = "opus"

[stages.recon]
max_turns = 12
tools = ["Bash", "Read", "Grep", "Glob"]
tier = "read_only"

[stages.analyze]
max_turns = 18
tools = ["Bash", "Read", "Grep", "Glob", "Write"]
tier = "write"

[stages.generate]
max_turns = 30
tools = ["Bash", "Read", "Grep", "Glob", "Write"]
tier = "full"
max_iters = 5
max_consecutive_nocrash = 3
max_candidates = 50

[recon]
semgrep_config = "auto"
output = "json"

[indexing]
enabled_for = ["hard"]

[instrument]
enabled = true
timeout_s = 600
fallback_reasoning = true

[thinking]
hard_budget_tokens = 16000

[caching]
enabled = true

[tokens]
token_efficient_tools = true      # NOTE: no-op on Claude 4+ (built in); kept for documentation
programmatic_tool_calling = true  # dispatcher truncates/filters tool output before it hits context
sliding_window_turns = 0          # 0 = disabled
max_output_tokens = 8000          # per-turn output cap (non-thinking stages)
max_output_tokens_thinking = 16000 # per-turn cap when adaptive thinking is on (avoid mid-thought truncation)
effort_hard = "high"              # output_config.effort for hard (opus/sonnet) thinking stages; never sent to Haiku

[claude_api]
max_retries = 4                   # AsyncAnthropic SDK auto-retries 429/5xx with backoff
timeout_s = 600

[claude_code]
# Headless `-p` mode needs a non-interactive permission mode. The agent runs
# bash/docker freely inside the task dir; this is a research benchmark harness.
permission_mode = "bypassPermissions"
exclude_dynamic_system_prompt = true   # better cross-task prompt-cache reuse
